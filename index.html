<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guyue-Master</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            },
            colors: {
              macOS: {
                bg: '#f5f5f7',
                sidebar: 'rgba(245, 245, 247, 0.8)',
                glass: 'rgba(255, 255, 255, 0.65)',
                border: 'rgba(0, 0, 0, 0.05)',
                accent: '#007AFF',
                danger: '#FF3B30',
                success: '#34C759',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f5f5f7;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Custom Scrollbar for that hidden macOS feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.1);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0,0,0,0.2);
      }

      /* ============ prose-chat: Chat markdown base ============ */
      .prose-chat { font-size: 0.875rem; line-height: 1.65; color: #374151; }
      .prose-chat > :first-child { margin-top: 0 !important; }
      .prose-chat > :last-child { margin-bottom: 0 !important; }

      /* ============ GitHub Blockquote Alerts ============ */
      .markdown-alert {
        border-left-width: 4px;
        border-radius: 0 0.5rem 0.5rem 0;
        padding: 0.6rem 1rem;
        margin: 0.75rem 0;
        font-size: 0.85rem;
      }
      .markdown-alert-title {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-weight: 600;
        font-size: 0.8rem;
        margin-bottom: 0.35rem;
        text-transform: uppercase;
        letter-spacing: 0.025em;
      }
      .markdown-alert-note   { border-color: #3b82f6; background: #eff6ff; }
      .markdown-alert-note .markdown-alert-title { color: #1d4ed8; }
      .markdown-alert-tip    { border-color: #10b981; background: #ecfdf5; }
      .markdown-alert-tip .markdown-alert-title { color: #065f46; }
      .markdown-alert-important { border-color: #8b5cf6; background: #f5f3ff; }
      .markdown-alert-important .markdown-alert-title { color: #5b21b6; }
      .markdown-alert-warning { border-color: #f59e0b; background: #fffbeb; }
      .markdown-alert-warning .markdown-alert-title { color: #92400e; }
      .markdown-alert-caution { border-color: #ef4444; background: #fef2f2; }
      .markdown-alert-caution .markdown-alert-title { color: #991b1b; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
